<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>CardioPredict Signup</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>❤️ CardioPredict</h1>

        <h2>Signup Form</h2>

        <input
            type="text"
            id="username"
            placeholder="Username">

        <input
            type="email"
            id="email"
            placeholder="Email Address">

        <input
            type="password"
            id="password"
            placeholder="Password">

        <input
            type="text"
            id="role"
            placeholder="Role (Doctor/Staff)">

        <input
            type="text"
            id="hospitalName"
            placeholder="Hospital Name">

        <input
            type="text"
            id="HP_ID"
            placeholder="Hospital Professional ID">

        <button
            id="signupBtn"
            class="submit-btn">

            Signup

        </button>

        <p class="signup-text">

            Already have an account?

            <a href="login.html">

                Login

            </a>

        </p>

    </div>

</div>

<script src="js/signup.js"></script>

</body>

</html>
