<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CardioPredict Login</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <div class="card">

        <h1>❤️ CardioPredict</h1>

        <h2>Login Form</h2>

        <div class="switch">

            <button class="active">
                Login
            </button>

            <button onclick="window.location.href='signup.html'">
                Signup
            </button>

        </div>

        <input
            type="text"
            id="username"
            placeholder="Username">

        <input
            type="password"
            id="password"
            placeholder="Password">

        <a href="#">
            Forgot Password?
        </a>

        <button
            id="loginBtn"
            class="submit-btn">

            Login

        </button>

        <p class="signup-text">

            Not a member?

            <a href="signup.html">

                Signup Now

            </a>

        </p>

    </div>

</div>

<script src="js/login.js"></script>

</body>
</html>
