<!DOCTYPE html>
<html>
<head>
    <title>CardioPredict</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <div class="card">

        <h1>❤️ CardioPredict</h1>

        <h2>CVD Risk Prediction</h2>

        <input type="text" id="Name" placeholder="Patient Name">

        <input type="number" id="PID" placeholder="Patient ID">

        <input type="number" id="Age" placeholder="Age">

        <input type="number" id="BMI" placeholder="BMI">

        <input type="number" id="Systolic_BP" placeholder="Systolic BP">

        <input type="number" id="Diabetes_Status" placeholder="Diabetes Status (0/1)">

        <input type="number" id="Estimated_LDL" placeholder="Estimated LDL">

        <input type="number" id="Total_Cholesterol" placeholder="Total Cholesterol">

        <input type="number" id="HDL" placeholder="HDL">

        <button
            class="submit-btn"
            id="predictBtn">

            Predict Risk

        </button>

        <div id="result"></div>

    </div>

</div>

<script src="js/prediction.js"></script>

</body>
</html>
